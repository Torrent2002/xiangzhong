<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>相中 — 你说不清的喜欢，AI 帮你找得到。</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="phone">
    <!-- 模式角标（AI 模式 / 本地兜底模式） -->
    <div id="modeBadge" class="mode-badge" title="当前 LLM 调用模式">…</div>
    <!-- 顶部状态栏 -->
    <div class="statusbar">
      <span class="time">9:41</span>
      <span class="dots">●●● ▮</span>
    </div>

    <div class="screen">
      <!-- 品牌区 -->
      <header class="brand">
        <div class="brand-row">
          <h1>相中</h1>
          <button id="myProfileBtn" class="link-btn" type="button">我的资料</button>
        </div>
        <p class="tagline">你说不清的喜欢，AI 帮你找得到。</p>
      </header>

      <!-- 输入区 -->
      <section class="input-area">
        <textarea id="desc" rows="3" placeholder="试试描述一下：温柔、不戴眼镜、瓜子脸、文艺风"></textarea>
        <div class="examples" id="examples">
          <span class="chip" data-text="温柔、不戴眼镜、瓜子脸、文艺风">温柔、不戴眼镜、瓜子脸</span>
          <span class="chip" data-text="阳光、运动风、戴眼镜、圆脸">阳光、运动风、戴眼镜</span>
        </div>
        <div class="ref-row">
          <input type="file" id="refImage" accept="image/*" hidden />
          <button class="ref-btn" id="refBtn" type="button">📷 上传理想型照片</button>
          <span class="ref-hint" id="refHint">让 AI 看照片反推理想型</span>
        </div>
        <button id="matchBtn" class="primary-btn">AI 帮我找</button>
      </section>

      <!-- 结果区 -->
      <section class="result-area">
        <!-- 空状态 -->
        <div class="empty-state" id="emptyState">
          <p class="empty-title">先描述一下你心里的那个人</p>
          <p class="empty-sub">或点上面的示例一键填入 ↑</p>
        </div>
        <!-- 加载态 -->
        <div class="loading hidden" id="loading">
          <div class="spinner"></div>
          <p>AI 正在理解你的描述…</p>
        </div>
        <!-- 结果 -->
        <div class="result hidden" id="result">
          <div class="intent-row">
            <span class="intent-label">AI 把你的描述理解为：</span>
            <span class="intent-pills" id="intentPills"></span>
            <span class="source-tag" id="intentSourceTag">解析</span>
          </div>
          <div class="cards" id="cards"></div>
        </div>
      </section>

      <!-- 底部：隐性偏好入口 -->
      <section class="bottom-area">
        <button id="suggestBtn" class="ghost-btn">看看 AI 发现了什么</button>
        <div class="suggestion hidden" id="suggestion"></div>
      </section>
    </div>

    <!-- 注册页（独立视图：注册自己成为候选人） -->
    <section class="register-view hidden" id="registerView">
      <div class="register-header">
        <button class="back-btn" id="registerBack" type="button">‹ 返回</button>
        <span class="register-title">完善我的资料</span>
      </div>
      <div class="register-body">
        <p class="register-tip">注册你的信息与照片，你将进入候选人池被别人匹配。照片由 AI 异步分析，不阻塞注册。</p>
        <input type="file" id="regImage" accept="image/*" hidden />
        <button class="ref-btn" id="regImageBtn" type="button">📷 上传我的照片</button>
        <span class="reg-photo-name" id="regPhotoName"></span>
        <input type="text" id="regName" placeholder="姓名" />
        <input type="text" id="regAge" placeholder="年龄" />
        <input type="text" id="regCity" placeholder="城市" />
        <textarea id="regBio" rows="2" placeholder="一句话介绍自己"></textarea>
        <button id="regSubmit" class="primary-btn" type="button">注册</button>
        <div class="create-msg hidden" id="regMsg"></div>
      </div>
    </section>

    <!-- 候选详情面板（覆盖在手机框内） -->
    <div class="detail-overlay hidden" id="detailOverlay">
      <div class="detail-mask" id="detailMask"></div>
      <div class="detail-panel" id="detailPanel">
        <button class="detail-close" id="detailClose" type="button" aria-label="关闭">×</button>
        <div class="detail-scroll" id="detailBody">
          <!-- JS 渲染 -->
        </div>
      </div>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
